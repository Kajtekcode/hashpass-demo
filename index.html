<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hash Pass Demo</title>
  <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@noble/secp256k1@1.7.1/dist/index.min.js"></script>
  <style>
    body { margin:0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background:#0a0a0a; color:#fff; min-height:100vh; }
    .container { max-width:420px; margin:0 auto; padding:40px 20px; text-align:center; }
    .logo { width:80px; height:80px; background:#fff; border-radius:20px; display:flex; align-items:center; justify-content:center; margin:0 auto 20px; font-size:42px; box-shadow:0 10px 30px rgba(0,0,0,0.4); }
    h1 { font-size:28px; margin-bottom:8px; }
    .subtitle { color:#aaaaaa; margin-bottom:50px; }
    .btn { display:block; width:100%; padding:18px; margin:12px 0; border:none; border-radius:16px; font-size:17px; font-weight:600; cursor:pointer; }
    .btn-primary { background:#f59e0b; color:#000; }
    .btn-secondary { background:#1f1f1f; color:#fff; }
    .qr-container { background:#1a1a1a; padding:30px; border-radius:20px; margin:40px auto; display:none; }
    .status { margin-top:20px; font-size:15px; color:#aaaaaa; }
    .success { color:#22c55e; font-weight:600; }
    .error { color:#ef4444; }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">🔑</div>
    <h1>Hash Pass Demo</h1>
    <p class="subtitle">Real Bitcoin cryptography authentication</p>

    <button class="btn btn-primary" onclick="register()">Register New Account</button>
    <button class="btn btn-secondary" onclick="startLogin()">Login with Hash Pass</button>
    <button class="btn btn-secondary" onclick="clearRegisteredKey()" 
            style="background:#333; margin-top:20px; font-size:15px;">
      Clear Registered Key
    </button>

    <div id="qrContainer" class="qr-container">
      <div id="qrcode"></div>
      <p class="status" id="qrStatus">Scan with Hash Pass app</p>
    </div>

    <div id="waitingScreen" style="display:none;">
      <p class="status">Verifying signature from app...</p>
    </div>

    <div id="successScreen" style="display:none;">
      <div style="font-size:70px; margin:40px 0;">🎉</div>
      <h2 class="success">Login Successful</h2>
      <p id="successText">You have been authenticated using Bitcoin cryptography.</p>
      <button class="btn btn-primary" onclick="resetDemo()">Try Again</button>
    </div>

    <div id="errorScreen" style="display:none;">
      <div style="font-size:70px; margin:40px 0;">❌</div>
      <h2 class="error">Access Denied</h2>
      <p id="errorText">Please register your public key first.</p>
      <button class="btn btn-primary" onclick="resetDemo()">Try Again</button>
    </div>
  </div>

  <script>
    let currentChallenge = "";

    function register() {
      currentChallenge = "register-" + Date.now();
      const payload = { site: "demo.hashpass.app", challenge: currentChallenge, register: true };
      showQR(payload);
    }

    function startLogin() {
      currentChallenge = "challenge-" + Date.now();
      const payload = { site: "demo.hashpass.app", challenge: currentChallenge, register: false };
      showQR(payload);
    }

    function clearRegisteredKey() {
      if (confirm("Clear registered public key?")) {
        localStorage.removeItem('hashpass_publicKey');
        alert("Key cleared. Register again with new seed.");
        resetDemo();
      }
    }

    function showQR(payload) {
      const qrData = JSON.stringify(payload);
      document.getElementById('qrContainer').style.display = 'block';
      document.getElementById('waitingScreen').style.display = 'none';
      document.getElementById('successScreen').style.display = 'none';
      document.getElementById('errorScreen').style.display = 'none';

      document.getElementById('qrcode').innerHTML = '';
      new QRCode(document.getElementById('qrcode'), {
        text: qrData,
        width: 260,
        height: 260,
        colorDark: "#ffffff",
        colorLight: "#1a1a1a",
      });
    }

    async function checkForResponseFromApp() {
      const urlParams = new URLSearchParams(window.location.search);
      const publicKey = urlParams.get('publicKey');
      const signature = urlParams.get('signature');
      const challenge = urlParams.get('challenge');

      if (publicKey && challenge && challenge.startsWith('register-')) {
        localStorage.setItem('hashpass_publicKey', publicKey);
        document.getElementById('qrContainer').style.display = 'none';
        document.getElementById('successScreen').style.display = 'block';
        document.getElementById('successText').textContent = 'Public key registered successfully!';
      } 
      else if (signature && challenge) {
        document.getElementById('qrContainer').style.display = 'none';
        document.getElementById('waitingScreen').style.display = 'block';
        setTimeout(() => verifySignature(signature, challenge), 800);
      }
    }

    async function verifySignature(signatureBase64, challenge) {
      const savedPublicKey = localStorage.getItem('hashpass_publicKey');
      
      if (!savedPublicKey) {
        document.getElementById('waitingScreen').style.display = 'none';
        document.getElementById('errorScreen').style.display = 'block';
        document.getElementById('errorText').textContent = 'No public key registered. Please register first.';
        return;
      }

      try {
        const messageHash = await nobleSecp256k1.utils.sha256(new TextEncoder().encode(challenge));
        const isValid = await nobleSecp256k1.verify(signatureBase64, messageHash, savedPublicKey);

        if (isValid) {
          document.getElementById('waitingScreen').style.display = 'none';
          document.getElementById('successScreen').style.display = 'block';
          document.getElementById('successText').textContent = 'Login verified with Bitcoin cryptography!';
        } else {
          document.getElementById('waitingScreen').style.display = 'none';
          document.getElementById('errorScreen').style.display = 'block';
          document.getElementById('errorText').textContent = 'Invalid signature for the registered key.';
        }
      } catch (e) {
        document.getElementById('waitingScreen').style.display = 'none';
        document.getElementById('errorScreen').style.display = 'block';
        document.getElementById('errorText').textContent = 'Verification error.';
      }
    }

    function resetDemo() {
      document.getElementById('qrContainer').style.display = 'none';
      document.getElementById('waitingScreen').style.display = 'none';
      document.getElementById('successScreen').style.display = 'none';
      document.getElementById('errorScreen').style.display = 'none';
    }

    window.onload = checkForResponseFromApp;
  </script>
</body>
</html>
